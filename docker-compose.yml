services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: llm-rag-backend
    network_mode: host
    depends_on:
      - postgres
      - qdrant
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5433/llm_rag
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-http://localhost:3000}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-llm-rag}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_SECONDS: ${JWT_EXPIRES_SECONDS:-3600}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5175,http://127.0.0.1:5175}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-ai-sage/Giga-Embeddings-instruct}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RERANK_FETCH_MULTIPLIER: ${RERANK_FETCH_MULTIPLIER:-3}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_NAME: ${TELEGRAM_SESSION_NAME:-llm_rag_session}
      TELEGRAM_MESSAGE_LIMIT: ${TELEGRAM_MESSAGE_LIMIT:-200}
      TELEGRAM_DAYS_BACK: ${TELEGRAM_DAYS_BACK:-30}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-rag-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    restart: unless-stopped

  example-ui:
    build:
      context: ./examples/cyber_threat_ui
      dockerfile: Dockerfile
    container_name: llm-rag-example-ui
    depends_on:
      - backend
    ports:
      - "5175:5175"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: llm-rag-postgres
    environment:
      POSTGRES_DB: llm_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: llm-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
